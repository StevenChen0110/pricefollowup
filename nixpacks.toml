[phases.setup]
nixPkgs = ["python311", "chromium", "nss", "nspr", "atk", "cups", "dbus", "expat",
           "libdrm", "libxkbcommon", "mesa", "libX11", "libXcomposite", "libXdamage",
           "libXext", "libXfixes", "libXrandr", "libgbm", "libudev", "alsa-lib"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium --with-deps"
]

[start]
cmd = "streamlit run app.py --server.port $PORT --server.address 0.0.0.0"
